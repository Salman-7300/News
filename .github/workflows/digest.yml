name: Täglicher KI-Digest

on:
  schedule:
    # 4:33 UTC = 6:33 Sommerzeit / 5:33 Winterzeit. Ungerade Minute = weniger
    # GitHub-Cron-Last, dadurch zuverlässiger als glatte Zeiten wie 4:30.
    # Für konstant 6:33 auch im Winter: auf "33 5 * * *" ändern.
    - cron: "33 4 * * *"
  workflow_dispatch: {}   # manueller Start über den Actions-Tab

permissions:
  contents: write   # damit der Workflow digests/ und docs/ committen darf

concurrency:
  group: digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Dependencies installieren
        run: pip install -r requirements.txt

      - name: Digest erzeugen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python digest.py

      - name: Ergebnis committen (Digest + Dashboard)
        run: |
          git config user.name "digest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add digests/ docs/ state/
          git diff --cached --quiet || git commit -m "Digest $(date -u +%F)"
          git push

      - name: Fehler-Alarm per Telegram
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ KI-Digest-Lauf fehlgeschlagen: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
