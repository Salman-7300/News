<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>KI-Digest</title>
<style>
  :root{
    --bg:#171310; --panel:#211b16; --border:#372c22;
    --text:#ede4d8; --muted:#a08d78; --accent:#d29a5b; --accent-dim:#8a6236;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
       font:16px/1.6 "Instrument Sans",system-ui,-apple-system,sans-serif}
  .wrap{max-width:820px;margin:0 auto;padding:32px 20px 80px}
  header{display:flex;justify-content:space-between;align-items:baseline;
         border-bottom:1px solid var(--border);padding-bottom:18px;margin-bottom:28px;
         flex-wrap:wrap;gap:12px}
  h1{font-size:1.5rem;margin:0;letter-spacing:.02em}
  h1 span{color:var(--accent)}
  .meta{color:var(--muted);font-size:.85rem}
  details{margin-bottom:22px}
  article{background:var(--panel);border:1px solid var(--border);
          border-radius:10px;padding:22px 24px}
  summary{cursor:pointer;font-weight:600;list-style:none;
          display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
  summary::-webkit-details-marker{display:none}
  .badge{color:var(--muted);font-weight:400;font-size:.8rem}
  article h2{font-size:.95rem;text-transform:uppercase;letter-spacing:.08em;
             color:var(--accent);margin:22px 0 8px;border-bottom:1px solid var(--border);
             padding-bottom:6px}
  article li{margin:8px 0 8px 4px;list-style:none;padding-left:16px;position:relative}
  article li::before{content:"›";position:absolute;left:0;color:var(--accent-dim)}
  article a{color:var(--accent);text-decoration:none}
  article a:hover{text-decoration:underline}
  article p{margin:10px 0}
  .empty{color:var(--muted);text-align:center;padding:60px 0}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>KI-<span>Digest</span></h1>
      <div class="meta">Serverlos via GitHub Actions · Stand: <!--UPDATED--></div>
    </div>
  </header>

  <input id="q" type="search" placeholder="🔎 Archiv durchsuchen (z.B. ollama, godot, cve)…"
         style="width:100%;background:var(--panel);border:1px solid var(--border);
                color:var(--text);border-radius:10px;padding:11px 14px;font:inherit;
                margin-bottom:22px">
  <div id="noResult" style="display:none;color:var(--muted);text-align:center;padding:30px 0">
    Keine Treffer im Archiv.</div>

  <!--DIGESTS-->
</div>

<script>
  const q = document.getElementById("q");
  const cards = [...document.querySelectorAll("details")];
  q.addEventListener("input", () => {
    const term = q.value.trim().toLowerCase();
    let visible = 0;
    cards.forEach(c => {
      const hit = !term || c.textContent.toLowerCase().includes(term);
      c.style.display = hit ? "" : "none";
      if (hit) { visible++; if (term) c.open = true; }
    });
    document.getElementById("noResult").style.display =
      (visible === 0 && term) ? "block" : "none";
  });
</script>
</body>
</html>
